<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 שיר האותיות – פאזל מוזיקלי</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Varela+Round&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fef9ec;
  --accent: #2563eb;
  --red: #dc2626;
  --green: #16a34a;
  --yellow: #eab308;
  --orange: #ea580c;
  --purple: #7c3aed;
  --teal: #0891b2;
  --text: #1e1b4b;
  --muted: #6b7280;
  --shadow: rgba(0,0,0,0.10);
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family: 'Varela Round', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--text);
  direction: rtl;
  overflow-x: hidden;
}

/* ── Blackboard bg texture ── */
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse at 10% 10%, rgba(37,99,235,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 90%, rgba(220,38,38,0.06) 0%, transparent 50%);
  pointer-events:none; z-index:0;
}

/* ── Ruled lines bg ── */
body::after {
  content:'';
  position:fixed; inset:0;
  background: repeating-linear-gradient(
    180deg,
    transparent 0px, transparent 31px,
    rgba(37,99,235,0.06) 31px, rgba(37,99,235,0.06) 32px
  );
  pointer-events:none; z-index:0;
}

/* ── Top pencil strip ── */
.top-strip {
  height: 14px;
  background: repeating-linear-gradient(90deg,
    #dc2626 0 30px, #fbbf24 30px 60px, #16a34a 60px 90px,
    #2563eb 90px 120px, #7c3aed 120px 150px, #ea580c 150px 180px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

/* ── Floating Hebrew letters ── */
.floaters {
  position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;
}
.floater {
  position:absolute;
  font-family:'Fredoka One',cursive;
  font-weight:700;
  opacity:0.055;
  animation:floatUp linear infinite;
  color: var(--accent);
}
@keyframes floatUp {
  0%   { transform:translateY(110vh) rotate(-10deg); }
  100% { transform:translateY(-15vh) rotate(10deg); }
}

.wrap {
  position:relative; z-index:1;
  max-width:820px;
  margin:0 auto;
  padding:20px 16px 80px;
}

/* ── Header ── */
header { text-align:center; padding:18px 0 22px; }

.blackboard {
  display:inline-block;
  background:#2d4a2d;
  border:6px solid #5a3a1a;
  border-radius:12px;
  padding:16px 32px 18px;
  box-shadow: 4px 6px 0 #3d2810, 0 8px 24px rgba(0,0,0,0.25);
  position:relative;
  margin-bottom:10px;
}
.blackboard::before {
  content:'';
  position:absolute;
  top:6px; right:6px; bottom:6px; left:6px;
  border:1px dashed rgba(255,255,255,0.1);
  border-radius:6px;
  pointer-events:none;
}
.logo {
  font-family:'Fredoka One',cursive;
  font-size:2.2em;
  color:#fff;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
  letter-spacing:1px;
}
.chalk-line {
  height:3px;
  background:rgba(255,255,255,0.25);
  border-radius:2px;
  margin:6px 0 4px;
}
.tagline-board {
  font-size:0.85em;
  color:rgba(255,255,255,0.7);
  font-family:'Varela Round',sans-serif;
}

/* ── Alphabet decoration ── */
.abc-row {
  display:flex;
  justify-content:center;
  gap:6px;
  flex-wrap:wrap;
  margin:6px 0 4px;
}
.abc-letter {
  width:32px; height:32px;
  border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Fredoka One',cursive;
  font-size:1em;
  font-weight:700;
  color:white;
  box-shadow:0 3px 0 rgba(0,0,0,0.2);
  animation: letterBounce 2s ease-in-out infinite;
}
.abc-letter:nth-child(odd) { animation-delay:.3s; }
@keyframes letterBounce {
  0%,100% { transform:translateY(0); }
  50%      { transform:translateY(-4px); }
}

/* ── Setup card ── */
.setup-card {
  background:white;
  border-radius:20px;
  padding:26px 24px;
  box-shadow:0 4px 24px var(--shadow);
  margin-bottom:20px;
  border:2px solid #e5e7eb;
  animation:fadeUp .5s ease both;
  position:relative;
  overflow:hidden;
}
.setup-card::before {
  content:'';
  position:absolute;
  top:0; right:0; left:0;
  height:5px;
  background:linear-gradient(90deg, var(--accent), var(--purple), var(--red));
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
.setup-card h2 {
  font-family:'Fredoka One',cursive;
  font-size:1.35em;
  color:var(--text);
  margin-bottom:16px;
  display:flex; align-items:center; gap:8px;
}
.field-label {
  font-size:0.78em; font-weight:700;
  color:var(--muted); text-transform:uppercase;
  letter-spacing:1px; margin-bottom:8px; display:block;
}
.seg-btns { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
.seg-btn {
  padding:10px 22px;
  border-radius:12px;
  border:2.5px solid #e0e0e0;
  background:white;
  color:var(--text);
  font-family:'Fredoka One',cursive;
  font-size:1.1em;
  cursor:pointer;
  transition:all .15s;
  position:relative;
}
.seg-btn:hover { border-color:var(--accent); color:var(--accent); }
.seg-btn.active {
  border-color:var(--accent);
  background:var(--accent);
  color:white;
  box-shadow:0 3px 12px rgba(37,99,235,0.35);
}
.btn-main {
  display:block; width:100%;
  padding:15px;
  background:linear-gradient(135deg, var(--accent), #1d4ed8);
  color:white; border:none; border-radius:16px;
  font-family:'Fredoka One',cursive; font-size:1.35em;
  cursor:pointer;
  box-shadow:0 4px 18px rgba(37,99,235,0.35);
  transition:transform .15s, box-shadow .15s;
}
.btn-main:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(37,99,235,0.45); }

/* ── Game screen ── */
#gameScreen { display:none; animation:fadeUp .4s ease both; }

.game-top {
  display:flex; align-items:center;
  justify-content:space-between;
  margin-bottom:14px; flex-wrap:wrap; gap:10px;
}
.song-badge {
  display:inline-flex; align-items:center; gap:8px;
  background:linear-gradient(135deg, #2d4a2d, #1a3a1a);
  color:#e8f5e9; border-radius:30px;
  padding:8px 20px;
  font-family:'Fredoka One',cursive; font-size:1.05em;
  box-shadow:0 3px 12px rgba(0,0,0,0.2);
  border:2px solid rgba(255,255,255,0.15);
}
.btn-sm {
  padding:8px 16px; border-radius:10px;
  border:1.5px solid #ddd; background:white;
  color:var(--text); font-family:'Fredoka One',cursive;
  font-size:0.88em; cursor:pointer; transition:all .15s;
  box-shadow:0 2px 8px var(--shadow);
}
.btn-sm:hover { border-color:var(--accent); color:var(--accent); }

.lives-row {
  display:flex; align-items:center; gap:6px;
  font-size:0.88em; color:var(--muted);
  font-weight:700; margin-bottom:12px;
}
.heart { font-size:1.3em; transition:all .2s; }
.heart.lost { filter:grayscale(1); opacity:0.3; }

/* ── Feedback ── */
.feedback {
  border-radius:14px; padding:12px 16px;
  text-align:center; font-weight:700; font-size:0.95em;
  margin-bottom:14px; display:none;
  animation:pop .3s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes pop { from{transform:scale(.85);opacity:0} to{transform:scale(1);opacity:1} }
.feedback.wrong { background:#fff0ee; border:2px solid #fca5a5; color:#b91c1c; }
.feedback.right  { background:#f0fdf4; border:2px solid #86efac; color:#15803d; }

/* ── Drop zones ── */
.zone-header {
  font-family:'Fredoka One',cursive; font-size:1em;
  color:var(--text); margin-bottom:8px;
  display:flex; align-items:center; gap:7px;
}

/* Answer zone looks like a notebook page */
.answer-zone-wrap {
  background:white;
  border-radius:16px;
  border:2px solid #bfdbfe;
  box-shadow:4px 4px 0 #bfdbfe;
  margin-bottom:16px;
  overflow:hidden;
}
.answer-zone-header {
  background:linear-gradient(135deg, var(--accent), #1d4ed8);
  color:white;
  padding:10px 16px;
  font-family:'Fredoka One',cursive;
  font-size:1em;
  display:flex; align-items:center; gap:8px;
}
.drop-zone {
  min-height:110px;
  border:2.5px dashed #d1d5db;
  border-radius:16px;
  padding:12px;
  display:flex; flex-wrap:wrap; gap:10px;
  align-items:flex-start;
  margin-bottom:16px;
  transition:border-color .2s, background .2s;
  direction:rtl;
  background:white;
}
.answer-zone-wrap .drop-zone {
  border:none; border-radius:0; margin-bottom:0;
  border-top:2px dashed #bfdbfe;
  background: repeating-linear-gradient(
    180deg,
    white 0px, white 35px,
    #eff6ff 35px, #eff6ff 36px
  );
}
.drop-zone.drag-over {
  border-color:var(--accent);
  background:#eff6ff;
}
.drop-zone.success-glow {
  border-color:var(--green) !important;
  background:#f0fdf4 !important;
  box-shadow:0 0 0 3px rgba(22,163,74,0.2);
}
.drop-placeholder {
  width:100%; text-align:center;
  padding:18px; color:#9ca3af;
  font-size:0.88em; pointer-events:none;
}

/* Pool zone looks like a pencil case / corkboard */
.pool-zone-wrap {
  background:#fef3c7;
  border-radius:16px;
  border:2px solid #fcd34d;
  box-shadow:4px 4px 0 #fcd34d;
  margin-bottom:16px;
  overflow:hidden;
}
.pool-zone-header {
  background:linear-gradient(135deg, #eab308, #ca8a04);
  color:white; padding:10px 16px;
  font-family:'Fredoka One',cursive; font-size:1em;
  display:flex; align-items:center; gap:8px;
}
.pool-zone-wrap .drop-zone {
  border:none; border-radius:0; margin-bottom:0;
  background:#fef9e7;
  border-top:2px dashed #fcd34d;
}

/* ── Segment card ── */
.seg-card {
  background:white;
  border:3px solid #e5e7eb;
  border-radius:16px;
  padding:12px 14px 14px;
  cursor:grab;
  user-select:none;
  transition:border-color .2s, box-shadow .2s, transform .15s;
  min-width:130px;
  box-shadow:0 2px 8px var(--shadow), 3px 3px 0 #e5e7eb;
  animation:cardIn .4s cubic-bezier(.34,1.56,.64,1) both;
  position:relative;
}
/* Pin effect */
.seg-card::before {
  content:'📌';
  position:absolute;
  top:-8px; right:10px;
  font-size:1em;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,0.3));
}
@keyframes cardIn { from{transform:scale(0.6) rotate(-3deg);opacity:0} to{transform:scale(1) rotate(0deg);opacity:1} }
.seg-card:hover {
  box-shadow:0 8px 20px rgba(0,0,0,0.13), 3px 3px 0 #d1d5db;
  transform:translateY(-4px) rotate(0.5deg);
}
.seg-card.dragging { opacity:0.4; transform:scale(0.95); }
.seg-card.playing {
  border-color:var(--accent) !important;
  box-shadow:0 0 0 3px rgba(37,99,235,0.25) !important;
}

/* Big Hebrew letter on card */
.seg-letter {
  display:block; text-align:center;
  font-size:2.4em;
  line-height:1;
  margin-bottom:4px;
}
.seg-duration {
  display:block; text-align:center;
  font-size:0.7em; color:var(--muted);
  margin-bottom:8px; font-weight:700;
}

/* Waveform */
.waveform {
  display:flex; align-items:center; justify-content:center;
  gap:2px; height:24px; margin-bottom:8px;
}
.wbar {
  width:3px; border-radius:2px;
  background:currentColor; opacity:0.5;
  transition:height .08s;
}

.play-btn {
  display:flex; align-items:center; justify-content:center; gap:6px;
  width:100%; padding:8px 10px;
  background:#f9fafb; border:1.5px solid #e5e7eb;
  border-radius:10px;
  font-family:'Varela Round',sans-serif; font-size:0.82em;
  font-weight:700; color:var(--text); cursor:pointer;
  transition:background .15s, border-color .15s;
}
.play-btn:hover { background:#eff6ff; border-color:var(--accent); color:var(--accent); }
.play-btn.active-play { background:#eff6ff; border-color:var(--accent); color:var(--accent); }

/* Card color themes */
.cc0 { border-color:#fecaca; box-shadow:0 2px 8px var(--shadow),3px 3px 0 #fecaca; }
.cc0 .seg-letter { color:#dc2626; } .cc0 .wbar { color:#dc2626; }
.cc0 .play-btn:hover { border-color:#dc2626; color:#dc2626; background:#fff5f5; }

.cc1 { border-color:#bbf7d0; box-shadow:0 2px 8px var(--shadow),3px 3px 0 #bbf7d0; }
.cc1 .seg-letter { color:#16a34a; } .cc1 .wbar { color:#16a34a; }
.cc1 .play-btn:hover { border-color:#16a34a; color:#16a34a; background:#f0fdf4; }

.cc2 { border-color:#bfdbfe; box-shadow:0 2px 8px var(--shadow),3px 3px 0 #bfdbfe; }
.cc2 .seg-letter { color:#2563eb; } .cc2 .wbar { color:#2563eb; }
.cc2 .play-btn:hover { border-color:#2563eb; color:#2563eb; background:#eff6ff; }

.cc3 { border-color:#fde68a; box-shadow:0 2px 8px var(--shadow),3px 3px 0 #fde68a; }
.cc3 .seg-letter { color:#ca8a04; } .cc3 .wbar { color:#ca8a04; }
.cc3 .play-btn:hover { border-color:#ca8a04; color:#ca8a04; background:#fefce8; }

.cc4 { border-color:#ddd6fe; box-shadow:0 2px 8px var(--shadow),3px 3px 0 #ddd6fe; }
.cc4 .seg-letter { color:#7c3aed; } .cc4 .wbar { color:#7c3aed; }
.cc4 .play-btn:hover { border-color:#7c3aed; color:#7c3aed; background:#faf5ff; }

.cc5 { border-color:#fed7aa; box-shadow:0 2px 8px var(--shadow),3px 3px 0 #fed7aa; }
.cc5 .seg-letter { color:#ea580c; } .cc5 .wbar { color:#ea580c; }
.cc5 .play-btn:hover { border-color:#ea580c; color:#ea580c; background:#fff7ed; }

/* ── Controls ── */
.controls { display:flex; gap:10px; margin-top:4px; flex-wrap:wrap; }
.btn-play-all {
  flex:1; min-width:150px; padding:13px;
  background:linear-gradient(135deg, var(--accent), #1d4ed8);
  color:white; border:none; border-radius:14px;
  font-family:'Fredoka One',cursive; font-size:1.15em;
  cursor:pointer; box-shadow:0 4px 0 #1d4ed8, 0 6px 14px rgba(37,99,235,0.3);
  transition:transform .15s, box-shadow .15s;
}
.btn-play-all:hover { transform:translateY(-2px); }
.btn-play-all:active { transform:translateY(2px); box-shadow:0 2px 0 #1d4ed8; }
.btn-play-all.is-playing { background:linear-gradient(135deg,#dc2626,#b91c1c); box-shadow:0 4px 0 #b91c1c; }

.btn-check {
  flex:1; min-width:150px; padding:13px;
  background:linear-gradient(135deg, var(--green), #15803d);
  color:white; border:none; border-radius:14px;
  font-family:'Fredoka One',cursive; font-size:1.15em;
  cursor:pointer; box-shadow:0 4px 0 #15803d, 0 6px 14px rgba(22,163,74,0.3);
  transition:transform .15s, box-shadow .15s;
}
.btn-check:hover { transform:translateY(-2px); }
.btn-check:active { transform:translateY(2px); box-shadow:0 2px 0 #15803d; }

/* Progress bar */
.progress-bar {
  height:6px; background:#e5e7eb;
  border-radius:3px; overflow:hidden;
  margin:10px 0; display:none;
}
.progress-fill {
  height:100%;
  background:linear-gradient(90deg, var(--accent), var(--purple));
  border-radius:3px; width:0%;
  transition:width .1s linear;
}

/* ── Success overlay ── */
#successOverlay {
  display:none; position:fixed; inset:0;
  background:rgba(254,249,236,0.9);
  backdrop-filter:blur(8px);
  z-index:100; align-items:center; justify-content:center;
}
#successOverlay.show { display:flex; animation:fadeIn .3s; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.success-card {
  background:white; border-radius:28px;
  padding:36px 28px; text-align:center;
  max-width:380px; margin:16px;
  box-shadow:0 20px 60px rgba(0,0,0,0.15);
  border:4px solid var(--green);
  animation:cardIn .5s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}
.blackboard-mini {
  display:inline-block;
  background:#2d4a2d;
  border:4px solid #5a3a1a;
  border-radius:10px;
  padding:10px 20px;
  margin-bottom:12px;
  box-shadow:3px 4px 0 #3d2810;
}
.blackboard-mini .big-emoji {
  font-size:3em; line-height:1; display:block;
}
.success-card h2 {
  font-family:'Fredoka One',cursive;
  font-size:2.2em; color:var(--green); margin-bottom:8px;
}
.success-card p {
  color:var(--muted); margin-bottom:20px;
  line-height:1.6; font-size:1.05em;
}

/* Confetti */
.conf {
  position:fixed; pointer-events:none; z-index:101;
  border-radius:3px;
  animation:confFall ease-out forwards;
}
@keyframes confFall {
  0%   { transform:translate(0,0) rotate(0deg); opacity:1; }
  100% { transform:translate(var(--dx), var(--dy)) rotate(var(--dr)); opacity:0; }
}

@media (max-width:520px) {
  .logo { font-size:1.8em; }
  .seg-card { min-width:110px; }
  .controls { flex-direction:column; }
  .blackboard { padding:12px 20px 14px; }
}
</style>
</head>
<body>
<div class="top-strip"></div>
<div class="floaters" id="floaters"></div>

<div class="wrap">
  <header>
    <div class="blackboard">
      <div class="logo">📚 שיר האותיות</div>
      <div class="chalk-line"></div>
      <div class="tagline-board">פאזל מוזיקלי לכיתה</div>
    </div>
    <div class="abc-row" id="abcRow"></div>
  </header>

  <!-- Setup -->
  <div id="setupScreen">
    <div class="setup-card">
      <h2>🎒 בחרו כמה קטעים:</h2>
      <div class="seg-btns">
        <button class="seg-btn" onclick="setSegs(3,this)">3 קטעים</button>
        <button class="seg-btn active" onclick="setSegs(4,this)">4 קטעים</button>
        <button class="seg-btn" onclick="setSegs(5,this)">5 קטעים</button>
        <button class="seg-btn" onclick="setSegs(6,this)">6 קטעים</button>
      </div>
      <button class="btn-main" onclick="processAudio()">✏️ התחילו לשחק!</button>
    </div>
  </div>

  <!-- Processing -->
  <div id="processingScreen" style="display:none; text-align:center; padding:60px 0;">
    <div style="font-size:3em; margin-bottom:14px; animation:spin 1s linear infinite; display:inline-block;">📖</div>
    <div style="font-family:'Fredoka One',cursive; font-size:1.4em; color:var(--accent); margin-bottom:8px;">מכין את הקטעים...</div>
    <div style="color:var(--muted);">מחלק את השיר לחתיכות 🎼</div>
  </div>

  <!-- Game -->
  <div id="gameScreen">
    <div class="game-top">
      <div class="song-badge">🖊️ שיר האותיות</div>
      <div style="display:flex; gap:8px;">
        <button class="btn-sm" onclick="reshuffleGame()">🔀 ערבוב מחדש</button>
        <button class="btn-sm" onclick="backToSetup()">⚙️ הגדרות</button>
      </div>
    </div>

    <div class="lives-row">
      <span>✏️ ניסיונות:</span>
      <span class="heart" id="h1">⭐</span>
      <span class="heart" id="h2">⭐</span>
      <span class="heart" id="h3">⭐</span>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="answer-zone-wrap">
      <div class="answer-zone-header">📋 הסדר שלי — גרור לכאן</div>
      <div class="drop-zone" id="answerZone"
        ondragover="event.preventDefault()"
        ondragenter="this.classList.add('drag-over')"
        ondragleave="dzLeave(event,this)"
        ondrop="dzDrop(event,this)">
        <div class="drop-placeholder">📝 גרורו את הקטעים לכאן לפי הסדר הנכון</div>
      </div>
    </div>

    <div class="pool-zone-wrap">
      <div class="pool-zone-header">🎲 קטעים מעורבבים — לחצו ▶ להאזנה</div>
      <div class="drop-zone" id="poolZone"
        ondragover="event.preventDefault()"
        ondragenter="this.classList.add('drag-over')"
        ondragleave="dzLeave(event,this)"
        ondrop="dzDrop(event,this)">
      </div>
    </div>

    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="controls">

// Hebrew alphabet letters for cards and floaters
const HEBREW = ['✏️','📓','🎒','🪑','📐','📏','🖍️','🔭','📌','🖊️','📚','🔬','📎','🗂️','🖇️','📋','🗃️','📌','✂️','🧮','🏫','🎨'];
const CARD_COLORS = ['cc0','cc1','cc2','cc3','cc4','cc5'];

// Build alphabet decoration row
(function() {
  const row = document.getElementById('abcRow');
  const bgs = ['#dc2626','#16a34a','#2563eb','#eab308','#7c3aed','#ea580c'];
  const letters = ['א','ב','ג','ד','ה','ו','ז','ח'];
  letters.forEach((l,i) => {
    const el = document.createElement('div');
    el.className = 'abc-letter';
    el.style.background = bgs[i % bgs.length];
    el.style.animationDelay = (i*0.15)+'s';
    el.textContent = l;
    row.appendChild(el);
  });
})();

// Floating Hebrew letters background
(function() {
  const cont = document.getElementById('floaters');
  for (let i=0; i<20; i++) {
    const el = document.createElement('div');
    el.className = 'floater';
    el.textContent = HEBREW[i % HEBREW.length];
    const hue = Math.floor(Math.random()*360);
    el.style.cssText = `left:${Math.random()*100}vw; top:${Math.random()*100}vh; font-size:${1.5+Math.random()*2.5}em; animation-duration:${14+Math.random()*18}s; animation-delay:-${Math.random()*25}s; color:hsl(${hue},60%,50%);`;
    cont.appendChild(el);
  }
})();

let audioCtx=null, originalBuffer=null, segments=[], numSegs=4;
let attempts=0; const MAX_ATTEMPTS=3;
let activeSource=null, activePlayBtn=null, animInt=null;
let isPlayingAll=false, playAllIdx=0;

function setSegs(n,btn) {
  numSegs=n;
  document.querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

async function processAudio() {
  document.getElementById('setupScreen').style.display='none';
  document.getElementById('processingScreen').style.display='block';
  await new Promise(r=>setTimeout(r,50));
  try {
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const bin = atob(SONG_B64);
    const bytes = new Uint8Array(bin.length);
    for (let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    originalBuffer = await audioCtx.decodeAudioData(bytes.buffer);
    sliceSegments();
    buildGame();
  } catch(e) {
    alert('שגיאה: '+e.message);
    backToSetup();
  }
}

function sliceSegments() {
  segments=[];
  const dur=originalBuffer.duration, sr=originalBuffer.sampleRate, ch=originalBuffer.numberOfChannels;
  const segDur=dur/numSegs;
  for (let i=0;i<numSegs;i++) {
    const s=Math.floor(i*segDur*sr), e2=Math.min(Math.floor((i+1)*segDur*sr),originalBuffer.length);
    const buf=audioCtx.createBuffer(ch,e2-s,sr);
    for (let c=0;c<ch;c++) buf.getChannelData(c).set(originalBuffer.getChannelData(c).subarray(s,e2));
    segments.push({ buffer:buf, correctIndex:i, letter:HEBREW[i % HEBREW.length], cc:CARD_COLORS[i % CARD_COLORS.length], dur:segDur });
  }
}

function buildGame() {
  attempts=0; updateHearts();
  document.getElementById('feedback').style.display='none';
  const order=segments.map((_,i)=>i);
  do { shuffle(order); } while (order.every((v,i)=>v===i));
  const pool=document.getElementById('poolZone'), answer=document.getElementById('answerZone');
  pool.innerHTML='';
  answer.innerHTML='<div class="drop-placeholder">📝 גרורו את הקטעים לכאן לפי הסדר הנכון</div>';
  answer.classList.remove('success-glow');
  order.forEach((idx,i) => pool.appendChild(makeCard(segments[idx],i)));
  document.getElementById('processingScreen').style.display='none';
  document.getElementById('gameScreen').style.display='block';
}

function makeCard(seg, delay) {
  const card=document.createElement('div');
  card.className=`seg-card ${seg.cc}`;
  card.draggable=true;
  card.dataset.idx=seg.correctIndex;
  card.style.animationDelay=delay*0.09+'s';
  const mm=String(Math.floor(seg.dur/60)).padStart(2,'0');
  const ss=String(Math.floor(seg.dur%60)).padStart(2,'0');
  const bars=Array.from({length:12},()=>`<div class="wbar" style="height:${4+Math.random()*18}px"></div>`).join('');
  card.innerHTML=`
    <span class="seg-letter">${seg.letter}</span>
    <span class="seg-duration">${mm}:${ss}</span>
    <div class="waveform">${bars}</div>
    <button class="play-btn" onclick="togglePlay(event,${seg.correctIndex},this)">▶ האזינו</button>
  `;
  card.addEventListener('dragstart',function(e){ this.classList.add('dragging'); e.dataTransfer.setData('text',''); window._dragCard=this; });
  card.addEventListener('dragend',function(){ this.classList.remove('dragging'); document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('drag-over')); });
  card.addEventListener('touchstart',tStart,{passive:false});
  card.addEventListener('touchmove',tMove,{passive:false});
  card.addEventListener('touchend',tEnd);
  return card;
}

function stopCurrent() {
  if (activeSource) { try{activeSource.stop();}catch(e){} activeSource=null; }
  if (activePlayBtn) {
    activePlayBtn.innerHTML='▶ האזינו';
    activePlayBtn.classList.remove('active-play');
    const c=activePlayBtn.closest('.seg-card');
    if(c) c.classList.remove('playing');
    activePlayBtn=null;
  }
  clearInterval(animInt);
  document.querySelectorAll('.seg-card').forEach(c=>c.classList.remove('playing'));
}

function togglePlay(e,idx,btn) {
  e.stopPropagation();
  if (isPlayingAll) { stopPlayAll(); return; }
  if (activePlayBtn===btn) { stopCurrent(); return; }
  stopCurrent();
  const seg=segments[idx];
  const src=audioCtx.createBufferSource();
  src.buffer=seg.buffer; src.connect(audioCtx.destination); src.start();
  activeSource=src; activePlayBtn=btn;
  btn.innerHTML='⏹ עצור'; btn.classList.add('active-play');
  const card=btn.closest('.seg-card');
  if(card) card.classList.add('playing');
  const bars=card.querySelectorAll('.wbar');
  animInt=setInterval(()=>bars.forEach(b=>b.style.height=(4+Math.random()*18)+'px'),110);
  src.onended=()=>{ if(activePlayBtn===btn) stopCurrent(); };
}

function playAll() {
  const cards=[...document.getElementById('answerZone').querySelectorAll('.seg-card')];
  if(!cards.length) { showFeedback('wrong','😅 גרורו קטעים לאזור התשובה קודם!'); return; }
  if(isPlayingAll) { stopPlayAll(); return; }
  stopCurrent();
  isPlayingAll=true; playAllIdx=0;
  document.getElementById('btnPlayAll').textContent='⏹ עצור';
  document.getElementById('btnPlayAll').classList.add('is-playing');
  document.getElementById('progressBar').style.display='block';
  playNextCard(cards);
}

function playNextCard(cards) {
  if(!isPlayingAll||playAllIdx>=cards.length) { stopPlayAll(); return; }
  const card=cards[playAllIdx], seg=segments[parseInt(card.dataset.idx)];
  card.classList.add('playing');
  const totalDur=cards.reduce((a,c)=>a+segments[parseInt(c.dataset.idx)].buffer.duration,0);
  const doneDur=cards.slice(0,playAllIdx).reduce((a,c)=>a+segments[parseInt(c.dataset.idx)].buffer.duration,0);
  const fill=document.getElementById('progressFill');
  fill.style.transition='none'; fill.style.width=(doneDur/totalDur*100)+'%';
  setTimeout(()=>{ fill.style.transition=`width ${seg.buffer.duration}s linear`; fill.style.width=((doneDur+seg.buffer.duration)/totalDur*100)+'%'; },50);
  const bars=card.querySelectorAll('.wbar');
  const ai=setInterval(()=>bars.forEach(b=>b.style.height=(4+Math.random()*18)+'px'),110);
  const src=audioCtx.createBufferSource();
  src.buffer=seg.buffer; src.connect(audioCtx.destination); src.start();
  activeSource=src;
  src.onended=()=>{ clearInterval(ai); card.classList.remove('playing'); playAllIdx++; playNextCard(cards); };
}

function stopPlayAll() {
  isPlayingAll=false;
  if(activeSource){ try{activeSource.stop();}catch(e){} activeSource=null; }
  document.getElementById('btnPlayAll').textContent='▶️ השמע את הסדר שלי';
  document.getElementById('btnPlayAll').classList.remove('is-playing');
  document.getElementById('progressBar').style.display='none';
  document.querySelectorAll('.seg-card').forEach(c=>c.classList.remove('playing'));
}

function checkOrder() {
  stopPlayAll(); stopCurrent();
  const cards=[...document.getElementById('answerZone').querySelectorAll('.seg-card')];
  if(cards.length<segments.length) { showFeedback('wrong',`⚠️ צריך לסדר את כל ${segments.length} הקטעים!`); return; }
  const userOrder=cards.map(c=>parseInt(c.dataset.idx));
  if(userOrder.every((v,i)=>v===i)) {
    document.getElementById('answerZone').classList.add('success-glow');
    document.getElementById('successOverlay').classList.add('show');
    launchConfetti();
  } else {
    attempts++; updateHearts();
    if(attempts>=MAX_ATTEMPTS) {
      showFeedback('wrong','😮 הסדר הנכון מוצג עכשיו!');
      revealCorrect();
    } else {
      const left=MAX_ATTEMPTS-attempts;
      showFeedback('wrong',`❌ לא בדיוק! עוד ${left===1?'ניסיון אחד':left+' ניסיונות'}`);
    }
  }
}

function revealCorrect() {
  const answer=document.getElementById('answerZone'), pool=document.getElementById('poolZone');
  answer.innerHTML=''; pool.innerHTML='';
  segments.forEach((seg,i)=>answer.appendChild(makeCard(seg,i)));
  answer.classList.add('success-glow');
}

function updateHearts() {
  for(let i=1;i<=3;i++) document.getElementById('h'+i).classList.toggle('lost',i>MAX_ATTEMPTS-attempts);
}

function showFeedback(type,msg) {
  const fb=document.getElementById('feedback');
  fb.className='feedback '+type; fb.textContent=msg; fb.style.display='block';
  clearTimeout(fb._t); fb._t=setTimeout(()=>fb.style.display='none',4000);
}

function reshuffleGame() {
  stopPlayAll(); stopCurrent(); attempts=0; updateHearts();
  document.getElementById('feedback').style.display='none';
  const all=[...document.getElementById('answerZone').querySelectorAll('.seg-card'),...document.getElementById('poolZone').querySelectorAll('.seg-card')];
  const answer=document.getElementById('answerZone'), pool=document.getElementById('poolZone');
  answer.innerHTML='<div class="drop-placeholder">📝 גרורו את הקטעים לכאן לפי הסדר הנכון</div>';
  answer.classList.remove('success-glow'); pool.innerHTML='';
  shuffle(all); all.forEach(c=>pool.appendChild(c));
}

function backToSetup() {
  stopPlayAll(); stopCurrent();
  document.getElementById('gameScreen').style.display='none';
  document.getElementById('setupScreen').style.display='block';
}

function dzLeave(e,zone) { if(!zone.contains(e.relatedTarget)) zone.classList.remove('drag-over'); }
function dzDrop(e,zone) {
  e.preventDefault(); zone.classList.remove('drag-over');
  const card=window._dragCard;
  if(!card||card.parentElement===zone) return;
  const ph=zone.querySelector('.drop-placeholder'); if(ph) ph.remove();
  zone.appendChild(card);
  const az=document.getElementById('answerZone');
  if(!az.querySelector('.seg-card')) az.innerHTML='<div class="drop-placeholder">📝 גרורו את הקטעים לכאן לפי הסדר הנכון</div>';
}

let tCard=null,tClone=null,tox=0,toy=0;
function tStart(e) {
  tCard=this; const t=e.touches[0],r=this.getBoundingClientRect();
  tox=t.clientX-r.left; toy=t.clientY-r.top;
  tClone=this.cloneNode(true);
  Object.assign(tClone.style,{position:'fixed',zIndex:999,width:r.width+'px',opacity:'0.85',pointerEvents:'none',transition:'none',left:(t.clientX-tox)+'px',top:(t.clientY-toy)+'px'});
  document.body.appendChild(tClone); this.style.opacity='0.25'; e.preventDefault();
}
function tMove(e) {
  if(!tClone) return; const t=e.touches[0];
  tClone.style.left=(t.clientX-tox)+'px'; tClone.style.top=(t.clientY-toy)+'px'; e.preventDefault();
}
function tEnd(e) {
  if(!tClone||!tCard) return;
  tClone.remove(); tCard.style.opacity='1';
  const t=e.changedTouches[0],el=document.elementFromPoint(t.clientX,t.clientY);
  const zone=el&&(el.closest('#answerZone')||el.closest('#poolZone'));
  if(zone&&zone!==tCard.parentElement) {
    const ph=zone.querySelector('.drop-placeholder'); if(ph) ph.remove();
    zone.appendChild(tCard);
    const az=document.getElementById('answerZone');
    if(!az.querySelector('.seg-card')) az.innerHTML='<div class="drop-placeholder">📝 גרורו את הקטעים לכאן לפי הסדר הנכון</div>';
  }
  tCard=null; tClone=null;
}

function shuffle(arr) { for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]; } }

function launchConfetti() {
  const cols=['#dc2626','#16a34a','#2563eb','#eab308','#7c3aed','#ea580c'];
  for(let i=0;i<55;i++) {
    setTimeout(()=>{
      const c=document.createElement('div');
      c.className='conf';
      const sz=7+Math.random()*10;
      Object.assign(c.style,{left:Math.random()*window.innerWidth+'px',top:(Math.random()*window.innerHeight*.4)+'px',
        width:sz+'px',height:sz*(Math.random()>.5?2:1)+'px',background:cols[Math.floor(Math.random()*cols.length)],
        '--dx':((Math.random()-.5)*280)+'px','--dy':(150+Math.random()*350)+'px','--dr':(Math.random()*600)+'deg',
        animationDuration:(1+Math.random()*.9)+'s'});
      document.body.appendChild(c); setTimeout(()=>c.remove(),2100);
    },i*28);
  }
}
</script>
